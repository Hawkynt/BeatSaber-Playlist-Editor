name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call: {}

# Force JavaScript-based actions to run on Node 24 instead of the deprecated Node 20 ahead of
# the 2026-06-16 hard cutover, until we bump each action to a Node-24-native major version.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.x'

      - name: Stamp versions into csprojs
        shell: bash
        run: perl .github/workflows/scripts/version.pl --stamp

      - name: Restore
        shell: bash
        run: dotnet restore "BeatSaber Playlist Editor.sln"

      - name: Build
        shell: bash
        run: dotnet build "BeatSaber Playlist Editor.sln" --configuration Release --no-restore

      - name: Test
        shell: bash
        run: dotnet test Tests/EditorTests/EditorTests.csproj --configuration Release --no-build --logger "trx;LogFileName=tests.trx"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: '**/TestResults/*.trx'

  coverage:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.x'

      - name: Stamp versions
        shell: bash
        run: perl .github/workflows/scripts/version.pl --stamp

      - name: Test with coverage
        shell: bash
        run: dotnet test Tests/EditorTests/EditorTests.csproj --configuration Release --collect:"XPlat Code Coverage" --results-directory ./coverage

      - name: Generate coverage report
        shell: bash
        run: |
          dotnet tool install -g dotnet-reportgenerator-globaltool
          reportgenerator -reports:./coverage/**/coverage.cobertura.xml -targetdir:./coverage/report -reporttypes:HtmlInline_AzurePipelines

      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ./coverage/report
